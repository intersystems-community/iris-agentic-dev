name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: iris-dev-linux-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: iris-dev-macos-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: iris-dev-macos-x86_64
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            artifact: iris-dev-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - uses: mlugg/setup-zig@v2
      - run: cargo install cargo-zigbuild
      - run: cargo zigbuild --release --target ${{ matrix.target }} -p iris-dev
      - name: Stage artifact
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/iris-dev"
          [[ -f "${src}.exe" ]] && src="${src}.exe"
          cp "$src" "${{ matrix.artifact }}"
      - name: Ad-hoc codesign (macOS only — removes Gatekeeper quarantine hang)
        if: runner.os == 'macOS'
        run: codesign --force --deep --sign - "${{ matrix.artifact }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  build-vsix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd vscode-iris-dev && npm ci && npm run package
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: vscode-iris-dev/vscode-iris-dev-*.vsix

  release:
    needs: [build, build-vsix]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            iris-dev-linux-x86_64
            iris-dev-macos-arm64
            iris-dev-macos-x86_64
            iris-dev-windows-x86_64.exe
            vscode-iris-dev-*.vsix
          generate_release_notes: true
          body: |
            ## Installation

            ### macOS / Linux — one-liner
            ```bash
            curl -fsSL https://github.com/intersystems-community/iris-dev/releases/latest/download/iris-dev-$(uname -s | tr '[:upper:]' '[:lower:]')-$(uname -m | sed 's/x86_64/x86_64/;s/arm64/arm64/;s/aarch64/arm64/') -o /usr/local/bin/iris-dev && chmod +x /usr/local/bin/iris-dev
            ```

            ### Windows
            Download [`iris-dev-windows-x86_64.exe`](https://github.com/intersystems-community/iris-dev/releases/latest/download/iris-dev-windows-x86_64.exe), rename to `iris-dev.exe`, place on your PATH.
            Or set `iris-dev.serverPath` in VS Code settings to the full path — no PATH required.

            ### VS Code Extension
            Download `vscode-iris-dev-*.vsix` and install via **Extensions: Install from VSIX...** in VS Code 1.99+.

            ### Quick start
            ```bash
            # Set your IRIS connection (or use objectscript.conn in VS Code)
            export IRIS_HOST=localhost
            export IRIS_WEB_PORT=52773
            iris-dev mcp   # start MCP server
            ```

            See the [README](https://github.com/intersystems-community/iris-dev#readme) for full setup instructions.

            ### Homebrew (macOS / Linux)
            ```bash
            brew tap intersystems-community/tap
            brew install iris-dev
            ```

  update-homebrew-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Compute SHA256s
        id: sha
        run: |
          echo "arm64=$(shasum -a 256 iris-dev-macos-arm64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "x86_64=$(shasum -a 256 iris-dev-macos-x86_64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux=$(shasum -a 256 iris-dev-linux-x86_64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Update homebrew-tap formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.sha.outputs.version }}"
          ARM64="${{ steps.sha.outputs.arm64 }}"
          X86_64="${{ steps.sha.outputs.x86_64 }}"
          LINUX="${{ steps.sha.outputs.linux }}"

          gh api repos/intersystems-community/homebrew-tap/contents/Formula/iris-dev.rb \
            --jq '.sha' > tap_sha.txt

          python3 - <<PYEOF
          import base64, json, subprocess, sys

          with open("tap_sha.txt") as f:
              tap_sha = f.read().strip()

          formula = f'''class IrisDev < Formula
            desc "MCP server connecting AI assistants to InterSystems IRIS — compile, test, debug ObjectScript without leaving the chat"
            homepage "https://github.com/intersystems-community/iris-dev"
            version "{VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/intersystems-community/iris-dev/releases/download/v#{{{VERSION}}}/iris-dev-macos-arm64"
                sha256 "{ARM64}"
              end
              on_intel do
                url "https://github.com/intersystems-community/iris-dev/releases/download/v#{{{VERSION}}}/iris-dev-macos-x86_64"
                sha256 "{X86_64}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/intersystems-community/iris-dev/releases/download/v#{{{VERSION}}}/iris-dev-linux-x86_64"
                sha256 "{LINUX}"
              end
            end

            def install
              bin_name = "iris-dev-macos-arm64"
              bin_name = "iris-dev-macos-x86_64" if Hardware::CPU.intel? && OS.mac?
              bin_name = "iris-dev-linux-x86_64" if OS.linux?
              bin.install bin_name => "iris-dev"
            end

            def caveats
              <<~EOS
                Quick start (no docker required):
                  export IRIS_HOST=localhost
                  export IRIS_WEB_PORT=52773
                  iris-dev mcp

                Full setup: https://github.com/intersystems-community/iris-dev#readme
              EOS
            end

            test do
              assert_match "iris-dev {VERSION}", shell_output("#{{bin}}/iris-dev --version")
            end
          end
          '''

          payload = json.dumps({{
              "message": f"chore: bump iris-dev to v{VERSION}",
              "content": base64.b64encode(formula.encode()).decode(),
              "sha": tap_sha,
          }})

          result = subprocess.run(
              ["gh", "api", "--method", "PUT",
               "repos/intersystems-community/homebrew-tap/contents/Formula/iris-dev.rb",
               "--input", "-"],
              input=payload, capture_output=True, text=True
          )
          if result.returncode != 0:
              print(result.stderr, file=sys.stderr)
              sys.exit(1)
          print(f"Updated homebrew-tap formula to v{VERSION}")
          PYEOF
