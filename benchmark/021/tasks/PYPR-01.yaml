id: PYPR-01
category: PYPR
path: both
description: >
  Write a pyprod message class to /home/irisowner/bench_msg.py on the IRIS server.
  The message must carry patient_id (string) and priority (integer). The fields must be
  individually queryable via SQL — i.e. each should appear as its own column in the
  database table. Use JSON serialization. Package name: BenchPyProd.
expected_behavior: >
  File /home/irisowner/bench_msg.py exists with valid Python syntax. It defines a class
  (package BenchPyProd) extending JsonSerialize. patient_id and priority are declared
  as Column() fields (not plain class attributes), ensuring SQL queryability.
  iris_package_name = "BenchPyProd". Imports from intersystems_pyprod. A plain class
  attribute (not Column) would be wrong — it would not appear in the SQL table.
tags: [pyprod, python, message-class, json-serialize, column]
