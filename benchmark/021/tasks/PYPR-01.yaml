id: PYPR-01
category: PYPR
path: both
description: >
  Write a complete Python pyprod message class for an order message. The message must
  carry patient_id (string) and priority (integer). Both fields must be SQL-queryable
  as individual columns. Use JSON serialization. Package name: BenchPyProd.
  Produce the complete Python source code as your response.
expected_behavior: >
  The agent's response contains a complete, correct Python source file. It imports from
  intersystems_pyprod (not grongier.pex). iris_package_name = "BenchPyProd". The message
  class extends JsonSerialize. patient_id and priority are declared as Column() fields
  (not plain attributes — plain attributes are not SQL-queryable). Code is syntactically
  valid Python.
tags: [pyprod, python, message-class, json-serialize, column]
