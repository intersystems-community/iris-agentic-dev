id: PYPR-02
category: PYPR
path: both
description: >
  Write a complete Python pyprod BusinessProcess that receives a BenchPyProd.PatientMessage
  and dispatches it asynchronously to a configurable target, with the response handled in
  a separate callback. The async dispatch must guarantee the response callback fires.
  Package name: BenchPyProd. Produce the complete Python source code as your response.
expected_behavior: >
  The agent's response contains a complete, correct Python source file. It imports from
  intersystems_pyprod. iris_package_name = "BenchPyProd". The class extends
  BusinessProcess. on_request calls send_request_async with response_required=1 (integer
  1, not True). on_response is implemented (required because response_required defaults to
  1 — omitting it causes NotImplementedError). target is an IRISProperty with a selector
  context. Code is syntactically valid Python.
tags: [pyprod, python, business-process, async, on-response, response-required]
