id: PYPR-03
category: PYPR
path: both
description: >
  Write a complete Python pyprod BusinessOperation that handles BenchPyProd.PatientMessage
  requests. The operation must have a connection_url setting that operators can configure
  from the IRIS production UI — it should not be hardcoded. Log the connection_url value
  when processing a request and return success. Package name: BenchPyProd. Produce the
  complete Python source code as your response.
expected_behavior: >
  The agent's response contains a complete, correct Python source file. It imports from
  intersystems_pyprod. iris_package_name = "BenchPyProd". The class extends
  BusinessOperation. connection_url is an IRISProperty (not IRISParameter — IRISParameter
  is a class constant, not operator-configurable, and does not appear in the UI). The
  operation handles BenchPyProd.PatientMessage via MessageMap or on_message, logs
  IRISLog.Info with the connection_url value, and returns Status.OK(). Code is
  syntactically valid Python.
tags: [pyprod, python, business-operation, iris-property, configuration]
